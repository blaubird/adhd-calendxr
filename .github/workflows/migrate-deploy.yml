name: Migrate

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      DATABASE_URL: ${{ secrets.POSTGRES_URL_NON_POOLING }}
      NODE_ENV: production
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - name: Validate CI secrets
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${DATABASE_URL:-}" ]; then
            echo "::error::Missing GitHub secret POSTGRES_URL_NON_POOLING. Add the direct/non-pooling production database URL."
            exit 1
          fi
      - run: pnpm install --frozen-lockfile
      - run: pnpm run ci:migrate
